<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #loader {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background: black;

  opacity: 0;
  transform: scale(1.05);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

/* 등장 상태 */
#loader.show {
  opacity: 1;
  transform: scale(1);
}

    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
    
  </style>
</head>
<body>

  <!-- 가넷 로딩 화면 -->
  <div id="loader">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.73/build/spline-viewer.js"></script>
    <spline-viewer url="https://prod.spline.design/a2crL82J0OIQjYqA/scene.splinecode"></spline-viewer>
  </div>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    const loader = document.getElementById("loader");

    // 🔥 부드럽게 등장 (ease-in)
    requestAnimationFrame(() => {
      loader.classList.add("show");
    });

    // 🔥 5초 후 다음 페이지 이동
    setTimeout(() => {
      window.location.href = "ganet view.html"; // 👉 여기 목적지 html로 바꿔
    }, 5000);
  });
</script>
</body>
</html>
