<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spline Fixed</title>

  <style>
   html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Cormorant Garamond', serif;
}

.viewport {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

.game-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: #000;
}
spline-viewer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  z-index: 1;

  opacity: 0;
  transform: scale(1.04);
  transition: opacity 1.6s ease-out, transform 1.6s ease-out;
}

spline-viewer.show {
  opacity: 1;
  transform: scale(1);
}

/* 처음 숨김 + 페이드 */
.show-delayed {
  opacity: 0;
  transition: opacity 1.2s ease;
}

.show-delayed.visible {
  opacity: 1;
}

@keyframes floatOnly {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-0.6vw);
  }
}

.constellation-wrap {
  position: absolute;
  left: 17%;
  top: 45%;
  transform: translateY(-50%);
  z-index: 5;
}

.constellation-img {
  width: clamp(17rem, 62vw, 65vw);
  max-width: 78vw;
  opacity: 0.92;
  pointer-events: auto;
  cursor: grab;
  user-select: none;
  -webkit-user-drag: none;
  display: block;

  filter:
    drop-shadow(0 0 0.45vw rgba(240, 165, 255, 0.9))
    drop-shadow(0 0 1vw rgba(180, 140, 255, 0.5))
    drop-shadow(0 0 2vw rgba(140, 100, 255, 0.28));

  mix-blend-mode: screen;
  animation: floatOnly 6s ease-in-out infinite;
  transition: filter 0.5s ease, transform 0.3s ease;
}

.constellation-img.dragging {
  cursor: grabbing;
  filter:
    drop-shadow(0 0 0.6vw rgba(255, 255, 255, 0.9))
    drop-shadow(0 0 1.2vw rgba(200, 150, 255, 0.6))
    drop-shadow(0 0 2.4vw rgba(160, 100, 255, 0.45));
  transform: scale(1.02);
}

/* 하단 인포 패널 */
.info-panel {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  pointer-events: auto;
  transition: all 0.5s ease;
}

.text-card {
  width: clamp(17rem, 60vw, 70rem);
  max-width: 86vw;
  height: auto;
}

.panel-content {
  display: flex;
  flex-direction: row;
  gap: clamp(0.9rem, 2vw, 2rem);
  align-items: flex-start;
  padding: clamp(0.9rem, 1.5vw, 1.2rem) clamp(1rem, 2vw, 1.5rem);
}

.panel-label {
  margin-bottom: 0.7rem;
  font-size: clamp(0.58rem, 0.72vw, 0.76rem);
  letter-spacing: 0.18em;
  color: rgba(255, 255, 255, 0.48);
}

.panel-content h2 {
  margin: 0 0 0.9rem 0;
  font-size: clamp(0.9rem, 1.1vw, 1.22rem);
  font-weight: 600;
  letter-spacing: 0.03em;
  color: rgba(255, 255, 255, 0.94);
}

.panel-content p {
  margin: 0 0 0.95rem 0;
  font-size: clamp(0.68rem, 0.82vw, 0.93rem);
  line-height: 1.7;
  color: rgba(255, 255, 255, 0.72);
}

.panel-content::after {
  content: "";
  margin-top: auto;
  width: 32%;
  height: 1px;
  background: linear-gradient(
    90deg,
    rgba(180, 140, 255, 0.9),
    rgba(255, 255, 255, 0)
  );
  opacity: 0.8;
}

.accent {
  color: #f9b7ff;
  text-shadow: 0 0 0.6vw rgba(255, 180, 200, 0.25);
}

.panel-card {
  overflow: hidden;
  border-radius: 0.8rem;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.11) 0%,
    rgba(255, 255, 255, 0.04) 100%
  );
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow:
    0 0 1.8vw rgba(0, 0, 0, 0.22),
    inset 0 0 0.7vw rgba(255, 255, 255, 0.035),
    inset 0 0 1vw rgba(110, 0, 20, 0.06);
}

.guide-text {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 7;

  font-size: clamp(0.62rem, 1vw, 1.1rem);
  letter-spacing: 0.08em;
  color: rgba(240, 165, 255, 0.85);
  text-align: center;
  white-space: nowrap;

  text-shadow:
    0 0 0.5vw rgba(255, 255, 255, 0.4),
    0 0 1.2vw rgba(255, 180, 200, 0.25);

  opacity: 0;
  animation: floatGuide 3s ease-in-out infinite;
}

@keyframes floatGuide {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-0.4vw); }
}

.music-btn {
  position: absolute;
  bottom: 6%;
  right: 4%;
  width: clamp(2.5rem, 3.2vw, 3.2rem);
  height: clamp(2.5rem, 3.2vw, 3.2rem);
  border-radius: 50%;
  z-index: 10;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border: 1px solid rgba(255, 255, 255, 0.18);

  box-shadow:
    0 0 0.8vw rgba(255, 180, 200, 0.25),
    inset 0 0 0.35vw rgba(255, 255, 255, 0.1);

  transition: all 0.3s ease;
}

.music-btn:hover {
  transform: scale(1.08);
}

.music-inner {
  width: clamp(0.7rem, 0.9vw, 0.9rem);
  height: clamp(0.7rem, 0.9vw, 0.9rem);
  border-radius: 50%;
  background: #e2b7ff;
  box-shadow:
    0 0 0.6vw rgba(240, 180, 255, 0.6),
    0 0 1.2vw rgba(224, 120, 255, 0.4);
}

.music-label {
  position: absolute;
  bottom: -1.2rem;
  font-size: clamp(0.52rem, 0.65vw, 0.65rem);
  letter-spacing: 0.12em;
  color: rgba(255, 255, 255, 0.6);
  text-align: center;
  width: 100%;
  white-space: nowrap;
}

.music-btn.playing .music-label {
  color: rgba(255, 180, 200, 0.9);
  text-shadow: 0 0 0.4vw rgba(255, 150, 180, 0.4);
}

.panel-toggle {
  position: absolute;
  bottom: 6%;
  right: 10%;
  z-index: 10;

  padding: 0.5em 1.2em;
  font-size: clamp(0.58rem, 0.78vw, 0.7rem);
  letter-spacing: 0.15em;

  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 999px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  cursor: pointer;
  transition: all 0.3s ease;
}

.panel-toggle:hover {
  background: rgba(180, 140, 255, 0.15);
  color: #bfa6ff;
}

.info-panel.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(40px);
  pointer-events: none;
}

.particles {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 28%;
  height: 28%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 4;
}

.particle {
  position: absolute;
  width: 0.32vw;
  height: 0.32vw;
  min-width: 2px;
  min-height: 2px;
  max-width: 4px;
  max-height: 4px;
  border-radius: 50%;

  background: rgba(230, 200, 255, 0.95);

  box-shadow:
    0 0 0.7vw rgba(220, 180, 255, 0.95),
    0 0 1.4vw rgba(180, 120, 255, 0.75),
    0 0 2.2vw rgba(140, 90, 255, 0.45);

  opacity: 0;
  animation: floatParticle linear infinite;
}

@keyframes floatParticle {
  0% {
    transform: translateY(0) scale(0.7);
    opacity: 0;
  }
  20% {
    opacity: 0.95;
  }
  100% {
    transform: translateY(-5vw) scale(1);
    opacity: 0;
  }
}

/* 작은 폰만 최소 보정 */
@media (max-width: 600px) {
  .constellation-wrap {
    left: 15%;
    top: 43%;
  }

  .constellation-img {
    width: clamp(14rem, 70vw, 24rem);
  }

  .text-card {
    width: clamp(14rem, 82vw, 24rem);
  }

  .panel-content {
    gap: 0.8rem;
    padding: 0.8rem 0.9rem;
  }

  .guide-text {
    top: 7%;
    font-size: clamp(0.56rem, 2.4vw, 0.78rem);
  }

  .panel-toggle {
    right: 16%;
  }

  .music-btn {
    right: 5%;
  }
}
  </style>
</head>
<body>

  <div class="viewport">
    <div class="game-container">

      <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>

      <spline-viewer
  id="splineScene"
  url="https://prod.spline.design/uq230uWl96q3mseM/scene.splinecode">
</spline-viewer>

      <!-- 상단 안내문 -->
      <div class="guide-text show-delayed">
        마우스를 클릭하며 자수정 행성 주변을 둘러보세요!
      </div>

      <!-- 왼쪽 별자리 이미지 -->
      <div class="constellation-wrap show-delayed">
  <div class="particles"></div>
  <img class="constellation-img" src="물병자리-인포.png" alt="물병자리" />
</div>
      <!-- 하단 인포 패널 -->
      <div class="info-panel show-delayed">
        <div class="panel-card text-card">
          <div class="panel-content">
            <div>
              <div class="panel-label">CONSTELLATION</div>
              <h2>물병자리</h2>
            </div>

            <div>
              <p>
                차가운 공기 속에서도 자유롭게 흐르는 별의 결은
                고요한 밤하늘 위에 독창적인 리듬을 남깁니다.
              </p>
              <p>
                물병자리는 맑고 투명한 감각 안에서
                <span class="accent">자유로움과 직관적인 빛</span>을 은은하게 드러냅니다.
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- 음악 버튼 -->
      <div class="music-btn" id="musicBtn">
        <div class="music-inner"></div>
        <div class="music-label">music on</div>
        <div class="panel-toggle show-delayed" id="panelToggle">
  INFO
</div>
      </div>
  
    </div>
  </div>

  <!-- 배경음악 -->
  <audio id="bgm" src="우주 음악.mp3" loop></audio>
<audio id="dragSound" src="별자리 잡음.mp3" preload="auto"></audio>

  <script>
    const spline = document.getElementById("splineScene");

window.addEventListener("load", () => {

  // ⭐ 스플라인 먼저 살짝 등장
  setTimeout(() => {
    spline.classList.add("show");
  }, 150);

  // ⭐ 나머지 요소들 나중에 등장
  setTimeout(() => {
    document.querySelectorAll(".show-delayed").forEach(el => {
      el.classList.add("visible");
    });
  }, 4000);

});
    const btn = document.getElementById("musicBtn");
    const audio = document.getElementById("bgm");
    const label = document.querySelector(".music-label");
    const dragSound = document.getElementById("dragSound");

    btn.addEventListener("click", async () => {
      try {
        if (audio.paused) {
          await audio.play();
          btn.classList.add("playing");
          label.textContent = "music off";
        } else {
          audio.pause();
          btn.classList.remove("playing");
          label.textContent = "music on";
        }
      } catch (err) {
        console.error("오디오 재생 실패:", err);
        alert("music 파일 경로나 파일명을 확인해줘!");
      }
    });
    const infoBtn = document.getElementById("panelToggle");
  const panel = document.querySelector(".info-panel");

  infoBtn.addEventListener("click", () => {
    panel.classList.toggle("hidden");

    if (panel.classList.contains("hidden")) {
      infoBtn.textContent = "SHOW";
    } else {
      infoBtn.textContent = "INFO";
    }
  });
   const wrap = document.querySelector(".constellation-wrap");
  const img = document.querySelector(".constellation-img");

  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let offsetX = 0;
  let offsetY = 0;

  function updateDragPosition() {
    wrap.style.transform = `translateY(-50%) translate(${offsetX}px, ${offsetY}px)`;
  }

  img.addEventListener("mousedown", (e) => {
  isDragging = true;
  img.classList.add("dragging");

  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;

  try {
    dragSound.currentTime = 0;
    dragSound.play();
  } catch (err) {
    console.error("드래그 효과음 재생 실패:", err);
  }

  e.preventDefault();
});

  window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    updateDragPosition();
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;
    img.classList.remove("dragging");
  });
  const particleContainer = document.querySelector(".particles");

  for (let i = 0; i < 28; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");

    // 랜덤 위치
    p.style.left = Math.random() * 100 + "%";
    p.style.top = Math.random() * 100 + "%";

    // 랜덤 애니메이션 시간
    p.style.animationDuration = 3 + Math.random() * 3 + "s";

    // 랜덤 딜레이
    p.style.animationDelay = Math.random() * 5 + "s";

    particleContainer.appendChild(p);
  }
  </script>

</body>
</html>
